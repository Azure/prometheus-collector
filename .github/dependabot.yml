# To get started with Dependabot version updates, we will need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options: 
# https://help.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
#
# NOTE: The following modules are managed by the otelcollector upgrade bot
# (otelcollector-upgrade.yml) and must NOT be added here independently:
#   - otelcollector/prometheusreceiver (heavy otel deps, synced from collector-contrib)
#   - otelcollector/otel-allocator (synced from opentelemetry-operator)
#   - otelcollector/prometheus-ui (prometheus versions track collector-builder)
#   - otelcollector/configuration-reader-builder (prometheus/common synced from otel-allocator)
# These modules are tightly coupled and must be upgraded atomically by upgrade.sh.

version: 2
updates:
  # ─── Core collector modules (managed by upgrade bot for otel deps) ─────
  - package-ecosystem: "gomod"
    directory: "/otelcollector/opentelemetry-collector-builder"
    schedule:
      interval: "daily"
      time: "10:00"
      timezone: "America/Los_Angeles"
    ignore:
    - dependency-name: "go.opentelemetry.io/collector*"
    - dependency-name: "github.com/open-telemetry/opentelemetry-collector-contrib*"
    open-pull-requests-limit: 2
    rebase-strategy: "auto"
    groups:
      go-dependencies:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/otelcollector/prom-config-validator-builder"
    schedule:
      interval: "daily"
      time: "10:00"
      timezone: "America/Los_Angeles"
    ignore:
    - dependency-name: "go.opentelemetry.io/collector*"
    - dependency-name: "github.com/open-telemetry/opentelemetry-collector-contrib*"
    open-pull-requests-limit: 2
    rebase-strategy: "auto"
    groups:
      go-dependencies:
        patterns: ["*"]

  # ─── Independent modules (no otel deps, safe for Dependabot) ───────────
  - package-ecosystem: "gomod"
    directory: "/otelcollector"
    schedule:
      interval: "daily"
      time: "10:00"
      timezone: "America/Los_Angeles"
    ignore:
    - dependency-name: "go.opentelemetry.io/collector*"
    - dependency-name: "github.com/open-telemetry/opentelemetry-collector-contrib*"
    open-pull-requests-limit: 2
    rebase-strategy: "auto"
    groups:
      go-dependencies:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/otelcollector/shared"
    schedule:
      interval: "daily"
      time: "10:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 2
    rebase-strategy: "auto"
    groups:
      go-dependencies:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/otelcollector/shared/configmap/ccp"
    schedule:
      interval: "daily"
      time: "10:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 2
    rebase-strategy: "auto"
    groups:
      go-dependencies:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/otelcollector/shared/configmap/mp"
    schedule:
      interval: "daily"
      time: "10:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 2
    rebase-strategy: "auto"
    groups:
      go-dependencies:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/otelcollector/fluent-bit/src"
    schedule:
      interval: "daily"
      time: "10:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 2
    rebase-strategy: "auto"
    groups:
      go-dependencies:
        patterns: ["*"]

  # ─── Non-shipped tools ─────────────────────────────────────────────────
  - package-ecosystem: "gomod"
    directory: "/mixins/kubernetes/scripts" # promtool - not shipped
    schedule:
      interval: "daily"
      time: "10:00"
      timezone: "America/Los_Angeles"
    ignore:
      - dependency-name: "*"
    open-pull-requests-limit: 2
    rebase-strategy: "auto"

  - package-ecosystem: "gomod"
    directory: "/internal/referenceapp/golang"
    schedule:
      interval: "daily"
      time: "10:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 2
    rebase-strategy: "auto"
    groups:
      go-dependencies:
        patterns: ["*"]

  # ─── GitHub Actions ────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "10:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 2
    rebase-strategy: "auto"
