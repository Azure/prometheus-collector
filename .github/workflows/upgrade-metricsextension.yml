name: upgrade-metricsextension
on:
  workflow_dispatch:
    inputs:
      me_version:
        description: 'New MetricsExtension version (e.g. 2.2025.722.956). Find versions at the AzureGenevaMonitoring NuGet feed.'
        required: true
        type: string
      cluster_name:
        description: 'AKS cluster name to deploy and test on (must have ama-metrics addon enabled)'
        required: true
        type: string
      resource_group:
        description: 'Azure resource group containing the test cluster'
        required: true
        type: string
      subscription_id:
        description: 'Azure subscription ID for the test cluster'
        required: true
        type: string
      skip_tests:
        description: 'Skip e2e tests after deployment (useful for dry-run)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  upgrade-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Validate version format
        run: |
          VERSION="${{ inputs.me_version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid ME version format '$VERSION'. Expected format: X.XXXX.XXX.XXX (e.g. 2.2025.722.956)"
            exit 1
          fi
          echo "ME_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Detect current ME version
        id: current-version
        run: |
          CURRENT=$(grep -oP 'metricsext2-\K[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' otelcollector/scripts/setup.sh | head -1)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current ME version: $CURRENT"
          echo "Target ME version: ${{ env.ME_VERSION }}"

          if [ "$CURRENT" = "${{ env.ME_VERSION }}" ]; then
            echo "::warning::Target version is the same as current version ($CURRENT). No upgrade needed."
            exit 0
          fi

      - name: Update ME version in setup.sh
        run: |
          CURRENT="${{ steps.current-version.outputs.current }}"
          sed -i "s/metricsext2-${CURRENT}/metricsext2-${{ env.ME_VERSION }}/g" otelcollector/scripts/setup.sh
          echo "✅ Updated setup.sh"

      - name: Update ME version in ccpsetup.sh
        run: |
          CURRENT="${{ steps.current-version.outputs.current }}"
          sed -i "s/metricsext2-${CURRENT}/metricsext2-${{ env.ME_VERSION }}/g" otelcollector/scripts/ccpsetup.sh
          echo "✅ Updated ccpsetup.sh"

      - name: Update ME version in Windows setup.ps1
        run: |
          CURRENT="${{ steps.current-version.outputs.current }}"
          sed -i "s/MdmMetricsExtension\.${CURRENT}/MdmMetricsExtension.${{ env.ME_VERSION }}/g" otelcollector/build/windows/scripts/setup.ps1
          sed -i "s/mdmmetricsextension\.${CURRENT}/mdmmetricsextension.${{ env.ME_VERSION }}/g" otelcollector/build/windows/scripts/setup.ps1
          echo "✅ Updated setup.ps1"

      - name: Verify all files updated consistently
        run: |
          echo "Checking version consistency across files..."
          SETUP_VER=$(grep -oP 'metricsext2-\K[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' otelcollector/scripts/setup.sh | head -1)
          CCP_VER=$(grep -oP 'metricsext2-\K[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' otelcollector/scripts/ccpsetup.sh | head -1)
          WIN_VER=$(grep -oP 'MdmMetricsExtension\.\K[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' otelcollector/build/windows/scripts/setup.ps1 | head -1)

          echo "  setup.sh:    $SETUP_VER"
          echo "  ccpsetup.sh: $CCP_VER"
          echo "  setup.ps1:   $WIN_VER"

          if [ "$SETUP_VER" != "${{ env.ME_VERSION }}" ] || [ "$CCP_VER" != "${{ env.ME_VERSION }}" ] || [ "$WIN_VER" != "${{ env.ME_VERSION }}" ]; then
            echo "::error::Version mismatch detected after update!"
            exit 1
          fi
          echo "✅ All files consistently updated to ${{ env.ME_VERSION }}"

      - name: Show diff
        run: git --no-pager diff

      - name: Create branch and commit
        run: |
          BRANCH="bot/me-upgrade-${{ env.ME_VERSION }}"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git add otelcollector/scripts/setup.sh otelcollector/scripts/ccpsetup.sh otelcollector/build/windows/scripts/setup.ps1
          git commit -m "build(deps): Upgrade MetricsExtension to ${{ env.ME_VERSION }}"
          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Check for existing PR
        id: check-pr
        run: |
          EXISTING=$(gh pr list --head "${{ env.BRANCH }}" --json number | jq length)
          echo "exists=$EXISTING" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Create Pull Request
        if: steps.check-pr.outputs.exists == '0'
        id: create-pr
        run: |
          PR_URL=$(gh pr create \
            --title "build(deps): Upgrade MetricsExtension to ${{ env.ME_VERSION }}" \
            --body "## MetricsExtension Upgrade

          **Previous version:** \`${{ steps.current-version.outputs.current }}\`
          **New version:** \`${{ env.ME_VERSION }}\`

          ### Files updated
          - \`otelcollector/scripts/setup.sh\` (Linux)
          - \`otelcollector/scripts/ccpsetup.sh\` (CCP)
          - \`otelcollector/build/windows/scripts/setup.ps1\` (Windows)

          ### Testing
          - Cluster: \`${{ inputs.cluster_name }}\` in \`${{ inputs.resource_group }}\`
          - E2E tests: ${{ inputs.skip_tests && 'Skipped' || 'Will run after build' }}

          ---
          *This PR was automatically generated by the ME upgrade workflow.*" \
            --head "${{ env.BRANCH }}" \
            --base "main")
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "Created PR: $PR_URL"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Build otelcollector to validate
        id: build
        continue-on-error: true
        run: |
          cd otelcollector/opentelemetry-collector-builder
          make 2>&1 | tee make_output.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "build_failed=true" >> $GITHUB_OUTPUT
          else
            echo "build_failed=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment build result on PR
        if: steps.create-pr.outputs.pr_url
        run: |
          if [ "${{ steps.build.outputs.build_failed }}" = "true" ]; then
            gh pr comment "${{ steps.create-pr.outputs.pr_url }}" --body "⚠️ **Build failed** after ME upgrade to \`${{ env.ME_VERSION }}\`. Manual investigation required.

          <details><summary>Build errors</summary>

          \`\`\`
          $(tail -50 otelcollector/opentelemetry-collector-builder/make_output.txt)
          \`\`\`
          </details>"
          else
            gh pr comment "${{ steps.create-pr.outputs.pr_url }}" --body "✅ **Build succeeded** with ME \`${{ env.ME_VERSION }}\`."
          fi
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}

      # ─── Deploy to test cluster and run e2e tests ────────────────────────
      - name: Azure Login
        if: ${{ !inputs.skip_tests && steps.build.outputs.build_failed == 'false' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        if: ${{ !inputs.skip_tests && steps.build.outputs.build_failed == 'false' }}
        run: |
          az aks get-credentials \
            --resource-group "${{ inputs.resource_group }}" \
            --name "${{ inputs.cluster_name }}" \
            --subscription "${{ inputs.subscription_id }}" \
            --overwrite-existing

      - name: Verify cluster connectivity
        if: ${{ !inputs.skip_tests && steps.build.outputs.build_failed == 'false' }}
        run: |
          echo "Verifying cluster connectivity..."
          kubectl get nodes
          echo "---"
          echo "Checking ama-metrics pods..."
          kubectl get pods -n kube-system -l rsName=ama-metrics
          kubectl get pods -n kube-system -l dsName=ama-metrics-node

      - name: Setup Go
        if: ${{ !inputs.skip_tests && steps.build.outputs.build_failed == 'false' }}
        uses: actions/setup-go@v5
        with:
          go-version-file: 'otelcollector/test/ginkgo-e2e/querymetrics/go.mod'

      - name: Install Ginkgo
        if: ${{ !inputs.skip_tests && steps.build.outputs.build_failed == 'false' }}
        run: go install github.com/onsi/ginkgo/v2/ginkgo@latest

      - name: Run container status tests
        if: ${{ !inputs.skip_tests && steps.build.outputs.build_failed == 'false' }}
        id: test-container-status
        continue-on-error: true
        working-directory: otelcollector/test/ginkgo-e2e/containerstatus
        run: |
          ginkgo -v --timeout=10m 2>&1 | tee test_output.txt
          echo "result=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Run liveness probe tests
        if: ${{ !inputs.skip_tests && steps.build.outputs.build_failed == 'false' }}
        id: test-liveness
        continue-on-error: true
        working-directory: otelcollector/test/ginkgo-e2e/livenessprobe
        run: |
          ginkgo -v --timeout=10m 2>&1 | tee test_output.txt
          echo "result=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Run query metrics tests
        if: ${{ !inputs.skip_tests && steps.build.outputs.build_failed == 'false' }}
        id: test-query-metrics
        continue-on-error: true
        working-directory: otelcollector/test/ginkgo-e2e/querymetrics
        run: |
          ginkgo -v --timeout=15m 2>&1 | tee test_output.txt
          echo "result=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Comment test results on PR
        if: ${{ !inputs.skip_tests && steps.build.outputs.build_failed == 'false' && steps.create-pr.outputs.pr_url }}
        run: |
          STATUS_RESULT="${{ steps.test-container-status.outputs.result }}"
          LIVENESS_RESULT="${{ steps.test-liveness.outputs.result }}"
          QUERY_RESULT="${{ steps.test-query-metrics.outputs.result }}"

          STATUS_ICON=$([[ "$STATUS_RESULT" == "0" ]] && echo "✅" || echo "❌")
          LIVENESS_ICON=$([[ "$LIVENESS_RESULT" == "0" ]] && echo "✅" || echo "❌")
          QUERY_ICON=$([[ "$QUERY_RESULT" == "0" ]] && echo "✅" || echo "❌")

          gh pr comment "${{ steps.create-pr.outputs.pr_url }}" --body "## E2E Test Results (ME ${{ env.ME_VERSION }})

          | Test Suite | Result |
          |---|---|
          | Container Status | ${STATUS_ICON} |
          | Liveness Probe | ${LIVENESS_ICON} |
          | Query Metrics | ${QUERY_ICON} |

          **Cluster:** \`${{ inputs.cluster_name }}\` (\`${{ inputs.resource_group }}\`)
          **Subscription:** \`${{ inputs.subscription_id }}\`"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Summary
        run: |
          echo "## MetricsExtension Upgrade Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Previous:** \`${{ steps.current-version.outputs.current }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **New:** \`${{ env.ME_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Build:** ${{ steps.build.outputs.build_failed == 'true' && '❌ Failed' || '✅ Passed' }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.skip_tests }}" = "false" ] && [ "${{ steps.build.outputs.build_failed }}" = "false" ]; then
            echo "- **Container Status Tests:** ${{ steps.test-container-status.outputs.result == '0' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Liveness Tests:** ${{ steps.test-liveness.outputs.result == '0' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Query Metrics Tests:** ${{ steps.test-query-metrics.outputs.result == '0' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          fi
