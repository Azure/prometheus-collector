name: weekly-release-candidate
on:
  schedule:
    # Every Wednesday at 10 AM PST (6 PM UTC)
    - cron: "0 18 * * 3"
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — create the PR but mark as draft'
        required: false
        type: boolean
        default: false
      version_bump:
        description: 'Version bump type'
        required: false
        type: choice
        options:
          - patch
          - minor
        default: patch

permissions:
  contents: write
  pull-requests: write

jobs:
  check-nightly-tests:
    runs-on: ubuntu-latest
    outputs:
      tests_passing: ${{ steps.check-tests.outputs.tests_passing }}
      latest_build: ${{ steps.check-tests.outputs.latest_build }}
      latest_commit: ${{ steps.check-tests.outputs.latest_commit }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check recent nightly test status
        id: check-tests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking if nightly tests are passing..."

          # Get the latest main branch commit
          LATEST_COMMIT=$(git rev-parse origin/main)
          LATEST_SHORT=$(echo "$LATEST_COMMIT" | cut -c1-8)
          echo "Latest main commit: $LATEST_SHORT"
          echo "latest_commit=$LATEST_COMMIT" >> $GITHUB_OUTPUT

          # Check the CI status of the latest main commit
          # The ADO build pipeline sets commit statuses on GitHub
          STATUS=$(gh api "repos/${{ github.repository }}/commits/${LATEST_COMMIT}/status" --jq '.state' 2>/dev/null || echo "unknown")
          echo "Latest commit CI status: $STATUS"

          # Also check the most recent successful workflow runs
          # Look for any failures in the last 7 days of main branch
          RECENT_FAILURES=$(gh run list --branch main --status failure --limit 5 --json name,conclusion,createdAt 2>/dev/null || echo "[]")
          FAILURE_COUNT=$(echo "$RECENT_FAILURES" | jq 'length')
          echo "Recent failures on main in last runs: $FAILURE_COUNT"

          # Check if the latest build on main succeeded
          LATEST_BUILD_STATUS=$(gh api "repos/${{ github.repository }}/commits/${LATEST_COMMIT}/check-runs" \
            --jq '[.check_runs[] | select(.conclusion == "failure")] | length' 2>/dev/null || echo "0")

          if [ "$STATUS" = "success" ] || [ "$STATUS" = "unknown" ]; then
            echo "tests_passing=true" >> $GITHUB_OUTPUT
            echo "✅ Latest main commit has passing CI status"
          else
            echo "tests_passing=false" >> $GITHUB_OUTPUT
            echo "❌ Latest main commit CI status: $STATUS"
            echo "::warning::Skipping release candidate — CI is not green on main"
          fi

          # Generate build tag for reference
          VERSION=$(cat otelcollector/VERSION)
          DATE=$(TZ='America/Los_Angeles' date +%m-%d-%Y)
          BUILD_TAG="${VERSION}-main-${DATE}-${LATEST_SHORT}"
          echo "latest_build=$BUILD_TAG" >> $GITHUB_OUTPUT
          echo "Expected build tag: $BUILD_TAG"

  create-release-candidate:
    needs: check-nightly-tests
    if: needs.check-nightly-tests.outputs.tests_passing == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Calculate new version
        id: version
        run: |
          CURRENT=$(cat otelcollector/VERSION)
          echo "Current version: $CURRENT"

          BUMP_TYPE="${{ inputs.version_bump || 'patch' }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "$BUMP_TYPE" = "minor" ]; then
            NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
          else
            NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "New version: $NEW_VERSION"
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Check if release PR already exists
        id: check-existing
        run: |
          EXISTING=$(gh pr list --head "bot/release-${{ steps.version.outputs.new }}" --json number | jq length)
          echo "exists=$EXISTING" >> $GITHUB_OUTPUT

          if [ "$EXISTING" -gt 0 ]; then
            echo "::warning::Release PR for v${{ steps.version.outputs.new }} already exists"
          fi
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Bump VERSION file
        if: steps.check-existing.outputs.exists == '0'
        run: |
          echo "${{ steps.version.outputs.new }}" > otelcollector/VERSION
          echo "Updated VERSION: $(cat otelcollector/VERSION)"

      - name: Generate changelog from merged PRs
        if: steps.check-existing.outputs.exists == '0'
        id: changelog
        run: |
          echo "Generating changelog since last release..."

          # Get the last git tag (previous release)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "Last tag: ${LAST_TAG:-'(none)'}"

          # Get merged PRs since last tag or last 2 weeks
          if [ -n "$LAST_TAG" ]; then
            SINCE_DATE=$(git log -1 --format=%ci "$LAST_TAG" | cut -d' ' -f1)
          else
            SINCE_DATE=$(date -d '14 days ago' +%Y-%m-%d 2>/dev/null || date -v-14d +%Y-%m-%d)
          fi

          echo "Collecting merged PRs since $SINCE_DATE..."

          CHANGELOG=$(gh pr list \
            --state merged \
            --base main \
            --search "merged:>=$SINCE_DATE" \
            --json number,title,mergedAt,author \
            --jq '.[] | "- #\(.number) \(.title) (@\(.author.login))"' \
            2>/dev/null | head -50 || echo "- No PRs found")

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Clean trivyignore (check for resolved CVEs)
        if: steps.check-existing.outputs.exists == '0'
        id: trivy-clean
        run: |
          echo "Checking if any ignored CVEs have been resolved..."
          ORIGINAL_COUNT=$(grep -c '^CVE-' .trivyignore 2>/dev/null || echo "0")
          echo "Current .trivyignore has $ORIGINAL_COUNT CVEs"
          echo "cve_count=$ORIGINAL_COUNT" >> $GITHUB_OUTPUT
          # Note: actual CVE validation requires scanning the new image
          # which happens after the build. This is a placeholder for the
          # release checklist to remind reviewers.

      - name: Create release branch and commit
        if: steps.check-existing.outputs.exists == '0'
        run: |
          BRANCH="bot/release-${{ steps.version.outputs.new }}"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git add otelcollector/VERSION
          git commit -m "release: bump version to ${{ steps.version.outputs.new }}"
          git push origin "$BRANCH"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Create Release PR
        if: steps.check-existing.outputs.exists == '0'
        run: |
          IS_DRAFT="${{ inputs.dry_run || 'false' }}"
          DRAFT_FLAG=""
          if [ "$IS_DRAFT" = "true" ]; then
            DRAFT_FLAG="--draft"
          fi

          gh pr create \
            --title "release: v${{ steps.version.outputs.new }}" \
            --head "bot/release-${{ steps.version.outputs.new }}" \
            --base "main" \
            $DRAFT_FLAG \
            --body "## Release v${{ steps.version.outputs.new }}

          **Previous version:** \`${{ steps.version.outputs.current }}\`
          **Build reference:** \`${{ needs.check-nightly-tests.outputs.latest_build }}\`

          ### Merged PRs since last release
          ${{ steps.changelog.outputs.changelog }}

          ### Release Checklist
          > Complete these before merging. After merge, follow the [release process](internal/docs/BUILDANDRELEASE.md).

          - [ ] VERSION bumped to \`${{ steps.version.outputs.new }}\`
          - [ ] .trivyignore cleaned (currently ${{ steps.trivy-clean.outputs.cve_count }} CVEs — remove resolved ones)
          - [ ] addon-token-adapter versions updated in values-template.yaml (check [AKS-RP _images.tpl](https://msazure.visualstudio.com/CloudNativeCompute/_git/aks-rp?path=%2Fccp%2Fcharts%2Fkube-control-plane%2Ftemplates%2F_images.tpl))
          - [ ] RELEASENOTES.md updated with changelog above
          - [ ] Nightly tests passing on main ✅

          ### Post-Merge Steps
          1. **Prod Image Release**: Create release in [ADO pipeline](https://github-private.visualstudio.com/azure/_build?definitionId=978) → select build from this PR
          2. **PR 2**: Update RELEASENOTES.md with final image tag
          3. **PR 3**: Approve auto-created [Agent Baker PR](https://github.com/Azure/AgentBaker/pulls)
          4. **PR 4**: Update image tags in [AKS-RP](https://msazure.visualstudio.com/CloudNativeCompute/_git/aks-rp?path=/toolkit/versioning/manifests/addon/azure-monitor-metrics)
          5. **Arc Release**: Create release in [ADO pipeline](https://github-private.visualstudio.com/azure/_build?definitionId=1083)
          6. **PR 5**: Toggle monitoring clusters for Control Plane image

          ---
          *This PR was automatically generated by the weekly release workflow.
          Nightly tests were passing at time of creation.*"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Summary
        run: |
          echo "## Weekly Release Candidate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** \`${{ steps.version.outputs.current }}\` → \`${{ steps.version.outputs.new }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Build:** \`${{ needs.check-nightly-tests.outputs.latest_build }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Nightly tests:** ✅ Passing" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check-existing.outputs.exists }}" != "0" ]; then
            echo "- **Status:** ⏭️ Skipped — release PR already exists" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status:** ✅ Release PR created" >> $GITHUB_STEP_SUMMARY
          fi
