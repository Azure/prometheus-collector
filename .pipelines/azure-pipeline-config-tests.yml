parameters:
- name: subscriptionName
  displayName: 'Subscription Name'
  type: string
  default: 'ContainerInsights_Build_Subscription'
- name: subscriptionID
  displayName: 'Subscription ID'
  type: string
  default: '9b96ebbd-c57a-42d1-bbe9-b69296e4c7fb'
- name: clusterName
  displayName: 'AKS Cluster Name'
  type: string
  default: 'ci-dev-aks-tests'
- name: clusterResourceGroup
  displayName: 'AKS Cluster Resource Group'
  type: string
  default: 'ci-dev-aks-tests'
- name: AMW_QUERY_ENDPOINT
  displayName: 'AMW Query Endpoint'
  type: string
  default: 'https://ci-dev-aks-tests-amw-fcdqc5d4agbyh9en.centralus.prometheus.monitor.azure.com'
- name: AZURE_CLIENT_ID
  displayName: 'Azure Client ID'
  type: string
  default: 'f8b1889c-310c-4913-93c5-3faf0f594f34'
- name: branch
  displayName: 'Branch to run tests from'
  type: string
  default: 'main'

variables:
  HELM_CHART_NAME: 'prometheus-collector'
  ACR_REGISTRY: 'containerinsightsprod.azurecr.io'
  ACR_REPOSITORY: '/public/azuremonitor/containerinsights/cidev/prometheus-collector/images'
  ACR_REPOSITORY_HELM: '/public/azuremonitor/containerinsights/cidev'
  MCR_REGISTRY: 'mcr.microsoft.com'
  MCR_REPOSITORY: '/azuremonitor/containerinsights/cidev/prometheus-collector/images'
  MCR_REPOSITORY_HELM: '/azuremonitor/containerinsights/cidev/prometheus-collector'
  MCR_REPOSITORY_HELM_DEPENDENCIES: '/azuremonitor/containerinsights/cidev'
  BUILD_WINDOWS: true
  Codeql.Enabled: true
  GOLANG_VERSION: '1.24.9'
  TESTKUBE_GOLANG_VERSION: '1.24.0'
  FLUENT_BIT_VERSION: '3.2.2'

stages:
- stage: Deploy
  jobs:
  - deployment: Testkube
    displayName: "Test: AKS testkube tests"
    environment: Prometheus-Collector-Tests
    timeoutInMinutes: 360
    pool:
      name: Azure-Pipelines-CI-Test-EO
      image: ci-1es-managed-ubuntu-2204
      os: linux
    condition: succeeded()
    variables:
      skipComponentGovernanceDetection: true
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
            persistCredentials: true

          - bash: |
              wget -qO - https://repo.testkube.io/key.pub | sudo apt-key add -
              echo "deb https://repo.testkube.io/linux linux main" | sudo tee -a /etc/apt/sources.list
              sudo apt-get update
              sudo apt-get install -y testkube

              exit 0
            workingDirectory: $(Build.SourcesDirectory)
            displayName: "Install testkube CLI"

          - bash: |
              curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
              chmod +x kubectl
              sudo mv kubectl /usr/local/bin/

              exit 0
            workingDirectory: $(Build.SourcesDirectory)
            displayName: "Install kubectl CLI"

          - bash: |
              curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

              exit 0
            workingDirectory: $(Build.SourcesDirectory)
            displayName: "Install Azure CLI"

          - bash: |
              set -e
              echo "executing the script to install golang $(GOLANG_VERSION)"
              wget https://go.dev/dl/go$(GOLANG_VERSION).linux-amd64.tar.gz
              sudo rm -rf /usr/local/go
              sudo tar -C /usr/local -xzf go$(GOLANG_VERSION).linux-amd64.tar.gz --verbose
              export PATH="/usr/local/go/bin:${PATH}"
              echo "##vso[task.prependpath]/usr/local/go/bin"
              go version
            workingDirectory: $(Build.SourcesDirectory)
            displayName: "Build: install golang $(GOLANG_VERSION)"

          - task: AzureCLI@2
            displayName: Get kubeconfig
            inputs:
                scriptType: 'bash'
                azureSubscription: ${{ parameters.subscriptionName }}(${{ parameters.subscriptionID }})
                scriptLocation: 'inlineScript'
                inlineScript: 'az aks get-credentials -g ${{ parameters.clusterResourceGroup }} -n ${{ parameters.clusterName }}'

          - bash: |
              mkdir -p "$(Build.ArtifactStagingDirectory)/testkube-results"
            displayName: "Prepare TestKube results directory"

          - bash: |
              kubectl apply -f ./test-cluster-yamls/configmaps/default-config-map/ama-metrics-settings-configmap-controlplane-istio-enabled.yaml

              # Inject fake MESH_MEMBER_METRICS_FQDN so the config merger includes the controlplane-istio job.
              # The test only validates config generation via /api/v1/status/config, not actual scraping.
              kubectl set env deployment/ama-metrics -n kube-system MESH_MEMBER_METRICS_FQDN="https://fake-istiod.example.com"
              kubectl set env deployment/ama-metrics-operator-targets -n kube-system MESH_MEMBER_METRICS_FQDN="https://fake-istiod.example.com"
              kubectl rollout status deployment/ama-metrics -n kube-system --timeout=300s
              kubectl rollout status deployment/ama-metrics-operator-targets -n kube-system --timeout=300s

              export BUILD_ARTIFACTSTAGINGDIRECTORY="$(Build.ArtifactStagingDirectory)"
              export BUILD_BUILDID="$(Build.BuildId)"
              export SYSTEM_JOBID="$(System.JobId)"
              export SYSTEM_TASKINSTANCEID="$(System.TaskInstanceId)"

              chmod +x ./testkube/run-testkube-workflow.sh
              ./testkube/run-testkube-workflow.sh \
                "${{ parameters.AMW_QUERY_ENDPOINT }}" \
                "${{ parameters.AZURE_CLIENT_ID }}" \
                "testkube-config-test-controlplane-istio-crs.yaml" \
                "testkube-config-test-controlplane-istio-crs.yaml" \
                "false" \
                "480" \
                "ConfigTests" \
                "${{ parameters.branch }}"
            workingDirectory: $(Build.SourcesDirectory)/otelcollector/test
            displayName: "Run tests for controlplane-istio with custom interval and regex"
            continueOnError: true

          - bash: |
              # Clean up the fake MESH_MEMBER_METRICS_FQDN env var for subsequent tests
              kubectl set env deployment/ama-metrics -n kube-system MESH_MEMBER_METRICS_FQDN-
              kubectl set env deployment/ama-metrics-operator-targets -n kube-system MESH_MEMBER_METRICS_FQDN-
              kubectl rollout status deployment/ama-metrics -n kube-system --timeout=300s
              kubectl rollout status deployment/ama-metrics-operator-targets -n kube-system --timeout=300s

              TESTKUBE_RESULTS_OTEL=$(jq -c '.environment="controlplane-istio"' "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json" | tr -d '\n\r')
              echo $TESTKUBE_RESULTS_OTEL
              echo $TESTKUBE_RESULTS_OTEL > "$(Build.ArtifactStagingDirectory)/testkube-results/testkube-results-controlplane-istio.json"
              rm -f "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json"
            displayName: "Create TestKube Results Summary and cleanup controlplane-istio env"
            condition: always()

          # List created files
          - bash: |
              echo "Results files created:"
              ls -la "$(Build.ArtifactStagingDirectory)/testkube-results/"
            displayName: "List Results Files"

          - bash: |
              export SYSTEM_PULLREQUEST_PULLREQUESTTITLE="$(System.PullRequest.PullRequestTitle)"
              export SYSTEM_PULLREQUEST_PULLREQUESTNUMBER="$(System.PullRequest.PullRequestNumber)"
              export BUILD_REASON="$(Build.Reason)"
              export BUILD_SOURCEVERSIONMESSAGE="$(Build.SourceVersionMessage)"
              export BUILD_SOURCEBRANCHNAME="$(Build.SourceBranchName)"
              export BUILD_BUILDNUMBER="$(Build.BuildNumber)"
              chmod +x ./otelcollector/test/testkube/send-testkube-summary.sh
              ./otelcollector/test/testkube/send-testkube-summary.sh $(TEAMS_WEBHOOK_URL) $(Build.ArtifactStagingDirectory)/testkube-results
            workingDirectory: $(Build.SourcesDirectory)
            displayName: "Send TestKube Summary Notification"