parameters:
- name: subscriptionName
  displayName: 'Subscription Name'
  type: string
  default: 'ContainerInsights_Build_Subscription'
- name: subscriptionID
  displayName: 'Subscription ID'
  type: string
  default: '9b96ebbd-c57a-42d1-bbe9-b69296e4c7fb'
- name: clusterName
  displayName: 'AKS Cluster Name'
  type: string
  default: 'ci-dev-aks-tests'
- name: clusterResourceGroup
  displayName: 'AKS Cluster Resource Group'
  type: string
  default: 'ci-dev-aks-tests'
- name: AMW_QUERY_ENDPOINT
  displayName: 'AMW Query Endpoint'
  type: string
  default: 'https://ci-dev-aks-tests-amw-fcdqc5d4agbyh9en.centralus.prometheus.monitor.azure.com'
- name: AZURE_CLIENT_ID
  displayName: 'Azure Client ID'
  type: string
  default: 'f8b1889c-310c-4913-93c5-3faf0f594f34'
- name: branch
  displayName: 'Branch to run tests from'
  type: string
  default: 'main'

variables:
  HELM_CHART_NAME: 'prometheus-collector'
  ACR_REGISTRY: 'containerinsightsprod.azurecr.io'
  ACR_REPOSITORY: '/public/azuremonitor/containerinsights/cidev/prometheus-collector/images'
  ACR_REPOSITORY_HELM: '/public/azuremonitor/containerinsights/cidev'
  MCR_REGISTRY: 'mcr.microsoft.com'
  MCR_REPOSITORY: '/azuremonitor/containerinsights/cidev/prometheus-collector/images'
  MCR_REPOSITORY_HELM: '/azuremonitor/containerinsights/cidev/prometheus-collector'
  MCR_REPOSITORY_HELM_DEPENDENCIES: '/azuremonitor/containerinsights/cidev'
  BUILD_WINDOWS: true
  Codeql.Enabled: true
  GOLANG_VERSION: '1.24.9'
  TESTKUBE_GOLANG_VERSION: '1.25.12'
  FLUENT_BIT_VERSION: '3.2.2'

stages:
- stage: Deploy
  jobs:
  - deployment: Testkube
    displayName: "Test: AKS testkube tests"
    environment: Prometheus-Collector-Tests
    timeoutInMinutes: 360
    pool:
      name: Azure-Pipelines-CI-Test-EO
      image: ci-1es-managed-ubuntu-2204
      os: linux
    condition: succeeded()
    variables:
      skipComponentGovernanceDetection: true
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
            persistCredentials: true

          - bash: |
              # Try apt install first, fall back to official install script
              wget -qO - https://repo.testkube.io/key.pub | sudo apt-key add - && \
              echo "deb https://repo.testkube.io/linux linux main" | sudo tee -a /etc/apt/sources.list && \
              sudo apt-get update && \
              sudo apt-get install -y testkube || \
              curl -sSLf https://get.testkube.io | sudo bash

              # Verify testkube is installed
              which kubectl-testkube || which testkube || { echo "ERROR: testkube CLI not installed"; exit 1; }
            workingDirectory: $(Build.SourcesDirectory)
            displayName: "Install testkube CLI"

          - bash: |
              curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
              chmod +x kubectl
              sudo mv kubectl /usr/local/bin/

              exit 0
            workingDirectory: $(Build.SourcesDirectory)
            displayName: "Install kubectl CLI"

          - bash: |
              curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

              exit 0
            workingDirectory: $(Build.SourcesDirectory)
            displayName: "Install Azure CLI"

          - bash: |
              set -e
              echo "executing the script to install golang $(GOLANG_VERSION)"
              wget https://go.dev/dl/go$(GOLANG_VERSION).linux-amd64.tar.gz
              sudo rm -rf /usr/local/go
              sudo tar -C /usr/local -xzf go$(GOLANG_VERSION).linux-amd64.tar.gz --verbose
              export PATH="/usr/local/go/bin:${PATH}"
              echo "##vso[task.prependpath]/usr/local/go/bin"
              go version
            workingDirectory: $(Build.SourcesDirectory)
            displayName: "Build: install golang $(GOLANG_VERSION)"

          - task: AzureCLI@2
            displayName: Get kubeconfig
            inputs:
                scriptType: 'bash'
                azureSubscription: ${{ parameters.subscriptionName }}(${{ parameters.subscriptionID }})
                scriptLocation: 'inlineScript'
                inlineScript: 'az aks get-credentials -g ${{ parameters.clusterResourceGroup }} -n ${{ parameters.clusterName }}'

          - bash: |
              mkdir -p "$(Build.ArtifactStagingDirectory)/testkube-results"
            displayName: "Prepare TestKube results directory"
          
          - bash: |
              # Delete all the configmaps to test the no configmaps case
              kubectl delete -f ./test-cluster-yamls/configmaps/ama-metrics-settings-configmap.yaml
              kubectl delete -f ./test-cluster-yamls/configmaps/ama-metrics-prometheus-config-configmap.yaml
              kubectl delete -f ./test-cluster-yamls/configmaps/ama-metrics-prometheus-config-node-configmap.yaml
              kubectl delete -f ./test-cluster-yamls/configmaps/ama-metrics-prometheus-config-node-windows-configmap.yaml

              export BUILD_ARTIFACTSTAGINGDIRECTORY="$(Build.ArtifactStagingDirectory)"
              export BUILD_BUILDID="$(Build.BuildId)"
              export SYSTEM_JOBID="$(System.JobId)"
              export SYSTEM_TASKINSTANCEID="$(System.TaskInstanceId)"

              chmod +x ./testkube/run-testkube-workflow.sh
              ./testkube/run-testkube-workflow.sh \
                "${{ parameters.AMW_QUERY_ENDPOINT }}" \
                "${{ parameters.AZURE_CLIENT_ID }}" \
                "testkube-config-test-no-configmaps-crs.yaml" \
                "testkube-config-test-no-configmaps-crs.yaml" \
                "false" \
                "480" \
                "ConfigTests" \
                "${{ parameters.branch }}"
            workingDirectory: $(Build.SourcesDirectory)/otelcollector/test
            displayName: "Run tests for no configmaps"
            continueOnError: true

          - bash: |
              TESTKUBE_RESULTS_OTEL=$(jq -c '.environment="no-configmaps"' "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json" | tr -d '\n\r')
              echo $TESTKUBE_RESULTS_OTEL
              echo $TESTKUBE_RESULTS_OTEL > "$(Build.ArtifactStagingDirectory)/testkube-results/testkube-results-no-configmaps.json"
              rm -f "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json"
            displayName: "Create TestKube Results Summary"
            condition: always()

          - bash: |
              kubectl apply -f ./test-cluster-yamls/configmaps/default-config-map/ama-metrics-settings-configmap-all-targets-disabled.yaml
              
              export BUILD_ARTIFACTSTAGINGDIRECTORY="$(Build.ArtifactStagingDirectory)"
              export BUILD_BUILDID="$(Build.BuildId)"
              export SYSTEM_JOBID="$(System.JobId)"
              export SYSTEM_TASKINSTANCEID="$(System.TaskInstanceId)"

              chmod +x ./testkube/run-testkube-workflow.sh
              ./testkube/run-testkube-workflow.sh \
                "${{ parameters.AMW_QUERY_ENDPOINT }}" \
                "${{ parameters.AZURE_CLIENT_ID }}" \
                "testkube-config-test-all-targets-disabled-crs.yaml" \
                "testkube-config-test-all-targets-disabled-crs.yaml" \
                "false" \
                "480" \
                "ConfigTests" \
                "${{ parameters.branch }}"
            workingDirectory: $(Build.SourcesDirectory)/otelcollector/test
            displayName: "Run tests for all targets disabled"
            continueOnError: true

          - bash: |
              TESTKUBE_RESULTS_OTEL=$(jq -c '.environment="all-targets-disabled"' "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json" | tr -d '\n\r')
              echo $TESTKUBE_RESULTS_OTEL
              echo $TESTKUBE_RESULTS_OTEL > "$(Build.ArtifactStagingDirectory)/testkube-results/testkube-results-all-targets-disabled.json"
              rm -f "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json"
            displayName: "Create TestKube Results Summary"
            condition: always()

          - bash: |
              kubectl apply -f ./test-cluster-yamls/configmaps/default-config-map/ama-metrics-settings-configmap-defaults-targets-turned-on.yaml

              export BUILD_ARTIFACTSTAGINGDIRECTORY="$(Build.ArtifactStagingDirectory)"
              export BUILD_BUILDID="$(Build.BuildId)"
              export SYSTEM_JOBID="$(System.JobId)"
              export SYSTEM_TASKINSTANCEID="$(System.TaskInstanceId)"

              chmod +x ./testkube/run-testkube-workflow.sh
              ./testkube/run-testkube-workflow.sh \
                "${{ parameters.AMW_QUERY_ENDPOINT }}" \
                "${{ parameters.AZURE_CLIENT_ID }}" \
                "testkube-config-test-default-targets-on-crs.yaml" \
                "testkube-config-test-default-targets-on-crs.yaml" \
                "false" \
                "480" \
                "ConfigTests" \
                "${{ parameters.branch }}"
            workingDirectory: $(Build.SourcesDirectory)/otelcollector/test
            displayName: "Run tests for all default targets in settings cfg map enabled"
            continueOnError: true

          - bash: |
              TESTKUBE_RESULTS_OTEL=$(jq -c '.environment="default-targets-on"' "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json" | tr -d '\n\r')
              echo $TESTKUBE_RESULTS_OTEL
              echo $TESTKUBE_RESULTS_OTEL > "$(Build.ArtifactStagingDirectory)/testkube-results/testkube-results-default-targets-on.json"
              rm -f "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json"
            displayName: "Create TestKube Results Summary"
            condition: always()

          - bash: |
              kubectl apply -f ./test-cluster-yamls/configmaps/default-config-map/ama-metrics-settings-configmap-rs-targets-enabled.yaml

              export BUILD_ARTIFACTSTAGINGDIRECTORY="$(Build.ArtifactStagingDirectory)"
              export BUILD_BUILDID="$(Build.BuildId)"
              export SYSTEM_JOBID="$(System.JobId)"
              export SYSTEM_TASKINSTANCEID="$(System.TaskInstanceId)"

              chmod +x ./testkube/run-testkube-workflow.sh
              ./testkube/run-testkube-workflow.sh \
                "${{ parameters.AMW_QUERY_ENDPOINT }}" \
                "${{ parameters.AZURE_CLIENT_ID }}" \
                "testkube-config-test-all-rs-targets-enabled-crs.yaml" \
                "testkube-config-test-all-rs-targets-enabled-crs.yaml" \
                "false" \
                "480" \
                "ConfigTests" \
                "${{ parameters.branch }}"
            workingDirectory: $(Build.SourcesDirectory)/otelcollector/test
            displayName: "Run tests for all rs targets in settings cfg map enabled"
            continueOnError: true

          - bash: |
              TESTKUBE_RESULTS_OTEL=$(jq -c '.environment="all-rs-targets-enabled"' "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json" | tr -d '\n\r')
              echo $TESTKUBE_RESULTS_OTEL
              echo $TESTKUBE_RESULTS_OTEL > "$(Build.ArtifactStagingDirectory)/testkube-results/testkube-results-all-rs-targets-enabled.json"
              rm -f "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json"
            displayName: "Create TestKube Results Summary"
            condition: always()

          - bash: |
              kubectl apply -f ./test-cluster-yamls/configmaps/default-config-map/ama-metrics-settings-configmap-ds-targets-enabled.yaml

              export BUILD_ARTIFACTSTAGINGDIRECTORY="$(Build.ArtifactStagingDirectory)"
              export BUILD_BUILDID="$(Build.BuildId)"
              export SYSTEM_JOBID="$(System.JobId)"
              export SYSTEM_TASKINSTANCEID="$(System.TaskInstanceId)"

              chmod +x ./testkube/run-testkube-workflow.sh
              ./testkube/run-testkube-workflow.sh \
                "${{ parameters.AMW_QUERY_ENDPOINT }}" \
                "${{ parameters.AZURE_CLIENT_ID }}" \
                "testkube-config-test-all-ds-targets-enabled-crs.yaml" \
                "testkube-config-test-all-ds-targets-enabled-crs.yaml" \
                "false" \
                "480" \
                "ConfigTests" \
                "${{ parameters.branch }}"
            workingDirectory: $(Build.SourcesDirectory)/otelcollector/test
            displayName: "Run tests for all ds targets in settings cfg map enabled"
            continueOnError: true

          - bash: |
              TESTKUBE_RESULTS_OTEL=$(jq -c '.environment="all-ds-targets-enabled"' "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json" | tr -d '\n\r')
              echo $TESTKUBE_RESULTS_OTEL
              echo $TESTKUBE_RESULTS_OTEL > "$(Build.ArtifactStagingDirectory)/testkube-results/testkube-results-all-ds-targets-enabled.json"
              rm -f "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json"
            displayName: "Create TestKube Results Summary"
            condition: always()

          - bash: |
              kubectl apply -f ./test-cluster-yamls/configmaps/default-config-map/ama-metrics-settings-configmap-all-targets-enabled.yaml

              export BUILD_ARTIFACTSTAGINGDIRECTORY="$(Build.ArtifactStagingDirectory)"
              export BUILD_BUILDID="$(Build.BuildId)"
              export SYSTEM_JOBID="$(System.JobId)"
              export SYSTEM_TASKINSTANCEID="$(System.TaskInstanceId)"

              chmod +x ./testkube/run-testkube-workflow.sh
              ./testkube/run-testkube-workflow.sh \
                "${{ parameters.AMW_QUERY_ENDPOINT }}" \
                "${{ parameters.AZURE_CLIENT_ID }}" \
                "testkube-config-test-all-targets-enabled-crs.yaml" \
                "testkube-config-test-all-targets-enabled-crs.yaml" \
                "false" \
                "480" \
                "ConfigTests" \
                "${{ parameters.branch }}"
            workingDirectory: $(Build.SourcesDirectory)/otelcollector/test
            displayName: "Run tests for all targets in settings cfg map enabled"
            continueOnError: true

          - bash: |
              TESTKUBE_RESULTS_OTEL=$(jq -c '.environment="all-targets-enabled"' "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json" | tr -d '\n\r')
              echo $TESTKUBE_RESULTS_OTEL
              echo $TESTKUBE_RESULTS_OTEL > "$(Build.ArtifactStagingDirectory)/testkube-results/testkube-results-all-targets-enabled.json"
              rm -f "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json"
            displayName: "Create TestKube Results Summary"
            condition: always()

          - bash: |
              kubectl delete -f ./test-cluster-yamls/configmaps/ama-metrics-settings-configmap.yaml
              kubectl delete -f ./test-cluster-yamls/configmaps/ama-metrics-prometheus-config-node-configmap.yaml
              kubectl delete -f ./test-cluster-yamls/configmaps/ama-metrics-prometheus-config-node-windows-configmap.yaml
              kubectl apply -f ./test-cluster-yamls/configmaps/default-config-map/ama-metrics-settings-configmap-defaults-targets-turned-on.yaml
              kubectl apply -f ./test-cluster-yamls/configmaps/custom-config-map/ama-metrics-prometheus-config-configmap-all-actions.yaml

              export BUILD_ARTIFACTSTAGINGDIRECTORY="$(Build.ArtifactStagingDirectory)"
              export BUILD_BUILDID="$(Build.BuildId)"
              export SYSTEM_JOBID="$(System.JobId)"
              export SYSTEM_TASKINSTANCEID="$(System.TaskInstanceId)"

              chmod +x ./testkube/run-testkube-workflow.sh
              ./testkube/run-testkube-workflow.sh \
                "${{ parameters.AMW_QUERY_ENDPOINT }}" \
                "${{ parameters.AZURE_CLIENT_ID }}" \
                "testkube-config-test-only-custom-configmap-crs.yaml" \
                "testkube-config-test-only-custom-configmap-crs.yaml" \
                "false" \
                "480" \
                "ConfigTests" \
                "${{ parameters.branch }}"
            workingDirectory: $(Build.SourcesDirectory)/otelcollector/test
            displayName: "Run tests for custom configmap with all actions enabled"
            continueOnError: true

          - bash: |
              TESTKUBE_RESULTS_OTEL=$(jq -c '.environment="only-custom-configmap"' "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json" | tr -d '\n\r')
              echo $TESTKUBE_RESULTS_OTEL
              echo $TESTKUBE_RESULTS_OTEL > "$(Build.ArtifactStagingDirectory)/testkube-results/testkube-results-only-custom-configmap.json"
              rm -f "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json"
            displayName: "Create TestKube Results Summary"
            condition: always()

          - bash: |
              kubectl apply -f ./test-cluster-yamls/configmaps/ama-metrics-prometheus-config-configmap.yaml

              export BUILD_ARTIFACTSTAGINGDIRECTORY="$(Build.ArtifactStagingDirectory)"
              export BUILD_BUILDID="$(Build.BuildId)"
              export SYSTEM_JOBID="$(System.JobId)"
              export SYSTEM_TASKINSTANCEID="$(System.TaskInstanceId)"

              chmod +x ./testkube/run-testkube-workflow.sh
              ./testkube/run-testkube-workflow.sh \
                "${{ parameters.AMW_QUERY_ENDPOINT }}" \
                "${{ parameters.AZURE_CLIENT_ID }}" \
                "testkube-config-test-global-settings-crs.yaml" \
                "testkube-config-test-global-settings-crs.yaml" \
                "false" \
                "480" \
                "ConfigTests" \
                "${{ parameters.branch }}"
            workingDirectory: $(Build.SourcesDirectory)/otelcollector/test
            displayName: "Run tests for global ext labels enabled"
            continueOnError: true

          - bash: |
              TESTKUBE_RESULTS_OTEL=$(jq -c '.environment="global-settings"' "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json" | tr -d '\n\r')
              echo $TESTKUBE_RESULTS_OTEL
              echo $TESTKUBE_RESULTS_OTEL > "$(Build.ArtifactStagingDirectory)/testkube-results/testkube-results-global-settings.json"
              rm -f "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json"
            displayName: "Create TestKube Results Summary"
            condition: always()

          - bash: |
              kubectl apply -f ./test-cluster-yamls/configmaps/custom-config-map/ama-metrics-prometheus-config-configmap-all-actions.yaml
              kubectl apply -f ./test-cluster-yamls/configmaps/ama-metrics-prometheus-config-node-configmap.yaml
              kubectl apply -f ./test-cluster-yamls/configmaps/ama-metrics-prometheus-config-node-windows-configmap.yaml
              
              export BUILD_ARTIFACTSTAGINGDIRECTORY="$(Build.ArtifactStagingDirectory)"
              export BUILD_BUILDID="$(Build.BuildId)"
              export SYSTEM_JOBID="$(System.JobId)"
              export SYSTEM_TASKINSTANCEID="$(System.TaskInstanceId)"

              chmod +x ./testkube/run-testkube-workflow.sh
              ./testkube/run-testkube-workflow.sh \
                "${{ parameters.AMW_QUERY_ENDPOINT }}" \
                "${{ parameters.AZURE_CLIENT_ID }}" \
                "testkube-config-test-custom-node-configmap-crs.yaml" \
                "testkube-config-test-custom-node-configmap-crs.yaml" \
                "false" \
                "480" \
                "ConfigTests" \
                "${{ parameters.branch }}"
            workingDirectory: $(Build.SourcesDirectory)/otelcollector/test
            displayName: "Run tests for custom node configmap enabled"
            continueOnError: true

          - bash: |
              TESTKUBE_RESULTS_OTEL=$(jq -c '.environment="custom-node-configmap"' "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json" | tr -d '\n\r')
              echo $TESTKUBE_RESULTS_OTEL
              echo $TESTKUBE_RESULTS_OTEL > "$(Build.ArtifactStagingDirectory)/testkube-results/testkube-results-custom-node-configmap.json"
              rm -f "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json"
            displayName: "Create TestKube Results Summary"
            condition: always()

          # --- Basic Auth ServiceMonitor Tests ---
          # TODO: When AKS 1.37 becomes available, create a 1.37+ test cluster to validate
          # the namespaced RBAC path (Role/RoleBinding + secrets_access_namespaces configmap setting)
          # instead of the cluster-wide secrets access that is used on < 1.37.
          - bash: |
              # Deploy basic-auth test resources
              kubectl apply -f ./test-cluster-yamls/basic-auth/namespace.yaml
              kubectl apply -f ./test-cluster-yamls/basic-auth/secret.yaml
              kubectl apply -f ./test-cluster-yamls/basic-auth/deployment.yaml
              kubectl apply -f ./test-cluster-yamls/basic-auth/servicemonitor.yaml

              # Detect K8s version and conditionally apply >= 1.37 resources
              KUBE_MINOR=$(kubectl version -o json | jq -r '.serverVersion.minor' | tr -d '+')
              echo "Kubernetes minor version: $KUBE_MINOR"
              if [ "$KUBE_MINOR" -ge 37 ] 2>/dev/null; then
                echo "K8s >= 1.37: applying RBAC and settings configmap with secrets_access_namespaces"
                kubectl apply -f ./test-cluster-yamls/basic-auth/rbac.yaml
                kubectl apply -f ./test-cluster-yamls/configmaps/default-config-map/ama-metrics-settings-configmap-basic-auth.yaml
              else
                echo "K8s < 1.37: skipping RBAC and settings configmap (cluster-wide secrets access is available)"
              fi

              # Wait for the basic-auth reference app to be ready
              kubectl rollout status deployment/basic-auth-ref-app -n basic-auth-test --timeout=120s

              export BUILD_ARTIFACTSTAGINGDIRECTORY="$(Build.ArtifactStagingDirectory)"
              export BUILD_BUILDID="$(Build.BuildId)"
              export SYSTEM_JOBID="$(System.JobId)"
              export SYSTEM_TASKINSTANCEID="$(System.TaskInstanceId)"

              chmod +x ./testkube/run-testkube-workflow.sh
              ./testkube/run-testkube-workflow.sh \
                "${{ parameters.AMW_QUERY_ENDPOINT }}" \
                "${{ parameters.AZURE_CLIENT_ID }}" \
                "testkube-config-test-basic-auth-smon-crs.yaml" \
                "testkube-config-test-basic-auth-smon-crs.yaml" \
                "false" \
                "480" \
                "ConfigTests" \
                "${{ parameters.branch }}"
            workingDirectory: $(Build.SourcesDirectory)/otelcollector/test
            displayName: "Run tests for basic auth ServiceMonitor"
            continueOnError: true

          - bash: |
              TESTKUBE_RESULTS_OTEL=$(jq -c '.environment="basic-auth-smon"' "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json" | tr -d '\n\r')
              echo $TESTKUBE_RESULTS_OTEL
              echo $TESTKUBE_RESULTS_OTEL > "$(Build.ArtifactStagingDirectory)/testkube-results/testkube-results-basic-auth-smon.json"
              rm -f "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json"
            displayName: "Create TestKube Results Summary"
            condition: always()

          # --- Basic Auth Secret Update Test ---
          - bash: |
              # Update the secret username to newadmin
              kubectl patch secret basic-auth-creds -n basic-auth-test \
                -p "{\"data\":{\"username\":\"$(echo -n newadmin | base64)\"}}"
              echo "Patched basic-auth-creds secret: username=newadmin"

              # Wait for the target allocator to pick up the secret change
              echo "Waiting 120s for config reload..."
              sleep 120

              export BUILD_ARTIFACTSTAGINGDIRECTORY="$(Build.ArtifactStagingDirectory)"
              export BUILD_BUILDID="$(Build.BuildId)"
              export SYSTEM_JOBID="$(System.JobId)"
              export SYSTEM_TASKINSTANCEID="$(System.TaskInstanceId)"

              chmod +x ./testkube/run-testkube-workflow.sh
              ./testkube/run-testkube-workflow.sh \
                "${{ parameters.AMW_QUERY_ENDPOINT }}" \
                "${{ parameters.AZURE_CLIENT_ID }}" \
                "testkube-config-test-basic-auth-secret-update-crs.yaml" \
                "testkube-config-test-basic-auth-secret-update-crs.yaml" \
                "false" \
                "480" \
                "ConfigTests" \
                "${{ parameters.branch }}"
            workingDirectory: $(Build.SourcesDirectory)/otelcollector/test
            displayName: "Run tests for basic auth secret update"
            continueOnError: true

          - bash: |
              TESTKUBE_RESULTS_OTEL=$(jq -c '.environment="basic-auth-secret-update"' "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json" | tr -d '\n\r')
              echo $TESTKUBE_RESULTS_OTEL
              echo $TESTKUBE_RESULTS_OTEL > "$(Build.ArtifactStagingDirectory)/testkube-results/testkube-results-basic-auth-secret-update.json"
              rm -f "$(Build.ArtifactStagingDirectory)/testkube-results-ConfigTests.json"

              # Clean up basic-auth test resources
              kubectl delete namespace basic-auth-test --ignore-not-found

              # Restore original settings configmap if it was changed (>= 1.37)
              KUBE_MINOR=$(kubectl version -o json | jq -r '.serverVersion.minor' | tr -d '+')
              if [ "$KUBE_MINOR" -ge 37 ] 2>/dev/null; then
                kubectl apply -f $(Build.SourcesDirectory)/otelcollector/test/test-cluster-yamls/configmaps/ama-metrics-settings-configmap.yaml
              fi
            displayName: "Create TestKube Results Summary and cleanup basic-auth resources"
            condition: always()

          # --- Basic Auth v2 ConfigMap Tests ---
          - bash: |
              # Re-deploy basic-auth test resources for v2 test
              kubectl apply -f ./test-cluster-yamls/basic-auth/namespace.yaml
              kubectl apply -f ./test-cluster-yamls/basic-auth/secret.yaml
              kubectl apply -f ./test-cluster-yamls/basic-auth/deployment.yaml
              kubectl apply -f ./test-cluster-yamls/basic-auth/servicemonitor.yaml

              # Apply v2 configmap (contains secrets_access_namespaces for >= 1.37)
              KUBE_MINOR=$(kubectl version -o json | jq -r '.serverVersion.minor' | tr -d '+')
              echo "Kubernetes minor version: $KUBE_MINOR"
