apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: healthsignal-controller
rules:
  # Watch HealthCheckRequests (created by AKS RP)
  - apiGroups: ["health.aks.io"]
    resources: ["healthcheckrequests"]
    verbs: ["get", "list", "watch"]
  # Create and update HealthSignals (our response)
  - apiGroups: ["health.aks.io"]
    resources: ["healthsignals"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["health.aks.io"]
    resources: ["healthsignals/status"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: healthsignal-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: healthsignal-controller
subjects:
  - kind: ServiceAccount
    name: ama-metrics
    namespace: kube-system
