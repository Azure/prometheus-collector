apiVersion: apps/v1
kind: Deployment
metadata:
    labels:
        component: ama-metrics
        kubernetes.azure.com/managedby: aks
    name: ama-metrics
    namespace: kube-system
spec:
    paused: false
    replicas: 2
    revisionHistoryLimit: 2
    selector:
        matchLabels:
            rsName: ama-metrics
    strategy:
        type: RollingUpdate
    template:
        metadata:
            annotations:
                agentVersion: 0.0.0.1
                cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
                schema-versions: v1
            labels:
                kubernetes.azure.com/managedby: aks
                rsName: ama-metrics
        spec:
            affinity:
                nodeAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                        - preference:
                            matchExpressions:
                                - key: kubernetes.azure.com/mode
                                  operator: In
                                  values:
                                    - system
                          weight: 100
                        - preference:
                            matchExpressions:
                                - key: azuremonitor/metrics.replica.preferred
                                  operator: In
                                  values:
                                    - "true"
                          weight: 50
                    requiredDuringSchedulingIgnoredDuringExecution:
                        nodeSelectorTerms:
                            - matchExpressions:
                                - key: kubernetes.io/os
                                  operator: In
                                  values:
                                    - linux
                                - key: type
                                  operator: NotIn
                                  values:
                                    - virtual-kubelet
                                - key: kubernetes.azure.com/cluster
                                  operator: Exists
            containers:
                - env:
                    - name: CLUSTER
                      value: /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/test-rg/providers/Microsoft.ContainerService/managedClusters/test-cluster
                    - name: AKSREGION
                      value: eastus
                    - name: MAC
                      value: "true"
                    - name: AZMON_COLLECT_ENV
                      value: "false"
                    - name: AZMON_OPERATOR_ENABLED
                      value: "true"
                    - name: AZMON_COLLECTOR_HPA_ENABLED
                      value: "true"
                    - name: customEnvironment
                      value: azurepubliccloud
                    - name: OMS_TLD
                      value: opinsights.azure.com
                    - name: CONTROLLER_TYPE
                      value: ReplicaSet
                    - name: NODE_IP
                      valueFrom:
                        fieldRef:
                            fieldPath: status.hostIP
                    - name: NODE_NAME
                      valueFrom:
                        fieldRef:
                            fieldPath: spec.nodeName
                    - name: POD_NAME
                      valueFrom:
                        fieldRef:
                            fieldPath: metadata.name
                    - name: POD_NAMESPACE
                      valueFrom:
                        fieldRef:
                            fieldPath: metadata.namespace
                    - name: CONTAINER_CPU_LIMIT
                      valueFrom:
                        resourceFieldRef:
                            containerName: prometheus-collector
                            divisor: 1m
                            resource: limits.cpu
                    - name: CONTAINER_MEMORY_LIMIT
                      valueFrom:
                        resourceFieldRef:
                            containerName: prometheus-collector
                            divisor: 1Mi
                            resource: limits.memory
                    - name: KUBE_STATE_NAME
                      value: ama-metrics-ksm
                    - name: NODE_EXPORTER_NAME
                    - name: NODE_EXPORTER_TARGETPORT
                      value: "19100"
                    - name: KUBE_STATE_VERSION
                      value: mcr.microsoft.com/oss/v2/kubernetes/kube-state-metrics:v2.17.0-6
                    - name: OPERATOR_TARGETS_TA_IMG_VERSION
                      value: 0.1.0-targetallocator
                    - name: OPERATOR_TARGETS_CFG_READER_IMG_VERSION
                      value: 0.1.0-cfg
                    - name: OPERATOR_TARGETS_HTTPS_ENABLED
                      value: "true"
                    - name: NODE_EXPORTER_VERSION
                    - name: AGENT_VERSION
                      value: 0.1.0
                    - name: MODE
                      value: advanced
                    - name: WINMODE
                      value: advanced
                    - name: MINIMAL_INGESTION_PROFILE
                      value: "true"
                  image: mcr.microsoft.com/azuremonitor/containerinsights/ciprod/prometheus-collector/images:0.1.0
                  imagePullPolicy: IfNotPresent
                  livenessProbe:
                    failureThreshold: 3
                    httpGet:
                        path: /health
                        port: 8080
                    initialDelaySeconds: 120
                    periodSeconds: 15
                    timeoutSeconds: 5
                  name: prometheus-collector
                  resources:
                    limits:
                        cpu: 7
                        memory: 14Gi
                    requests:
                        cpu: 150m
                        memory: 500Mi
                  securityContext:
                    capabilities:
                        add:
                            - DAC_OVERRIDE
                        drop:
                            - ALL
                    privileged: false
                  volumeMounts:
                    - mountPath: /etc/config/settings
                      name: settings-vol-config
                      readOnly: true
                    - mountPath: /etc/prometheus/certs
                      name: ama-metrics-tls-secret-volume
                      readOnly: true
                    - mountPath: /etc/operator-targets/client/certs
                      name: ama-metrics-operator-targets-client-tls-secret-volume
                      readOnly: true
                    - mountPath: /etc/config/settings/prometheus
                      name: prometheus-config-vol
                      readOnly: true
                    - mountPath: /var/log/containers
                      name: host-log-containers
                      readOnly: true
                    - mountPath: /var/log/pods
                      name: host-log-pods
                      readOnly: true
                    - mountPath: /anchors/mariner
                      name: anchors-mariner
                      readOnly: true
                    - mountPath: /anchors/ubuntu
                      name: anchors-ubuntu
                      readOnly: true
                - args:
                    - --secret-namespace=kube-system
                    - --secret-name=aad-msi-auth-token
                    - --token-server-listening-port=7777
                    - --health-server-listening-port=9999
                    - --restart-pod-waiting-minutes-on-broken-connection=240
                  command:
                    - /addon-token-adapter
                  env:
                    - name: AZMON_COLLECT_ENV
                      value: "false"
                  image: mcr.microsoft.com/aks/msi/addon-token-adapter:master.260209.2
                  imagePullPolicy: IfNotPresent
                  livenessProbe:
                    httpGet:
                        path: /healthz
                        port: 9999
                    initialDelaySeconds: 10
                    periodSeconds: 60
                  name: addon-token-adapter
                  resources:
                    limits:
                        cpu: 500m
                        memory: 500Mi
                    requests:
                        cpu: 20m
                        memory: 30Mi
                  securityContext:
                    capabilities:
                        add:
                            - NET_ADMIN
                            - NET_RAW
                        drop:
                            - ALL
            priorityClassName: system-node-critical
            serviceAccountName: ama-metrics-serviceaccount
            tolerations:
                - key: CriticalAddonsOnly
                  operator: Exists
                - effect: NoExecute
                  operator: Exists
            topologySpreadConstraints:
                - labelSelector:
                    matchLabels:
                        rsName: ama-metrics
                  maxSkew: 1
                  topologyKey: kubernetes.io/hostname
                  whenUnsatisfiable: ScheduleAnyway
                - labelSelector:
                    matchLabels:
                        rsName: ama-metrics
                  maxSkew: 1
                  topologyKey: topology.kubernetes.io/zone
                  whenUnsatisfiable: ScheduleAnyway
            volumes:
                - configMap:
                    name: ama-metrics-settings-configmap
                    optional: true
                  name: settings-vol-config
                - configMap:
                    name: ama-metrics-prometheus-config
                    optional: true
                  name: prometheus-config-vol
                - hostPath:
                    path: /var/log/containers
                  name: host-log-containers
                - hostPath:
                    path: /var/log/pods
                  name: host-log-pods
                - hostPath:
                    path: /etc/pki/ca-trust/source/anchors/
                    type: DirectoryOrCreate
                  name: anchors-mariner
                - name: ama-metrics-tls-secret-volume
                  secret:
                    optional: true
                    secretName: ama-metrics-mtls-secret
                - name: ama-metrics-operator-targets-client-tls-secret-volume
                  secret:
                    optional: true
                    secretName: ama-metrics-operator-targets-client-tls-secret
                - hostPath:
                    path: /usr/local/share/ca-certificates/
                    type: DirectoryOrCreate
                  name: anchors-ubuntu

