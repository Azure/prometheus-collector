                  name: anchors-ubuntu
    updateStrategy:
        rollingUpdate:
            maxUnavailable: 50%
        type: RollingUpdate

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
    labels:
        component: ama-metrics
        kubernetes.azure.com/managedby: aks
    name: ama-metrics-win-node
    namespace: kube-system
spec:
    selector:
        matchLabels:
            dsName: ama-metrics-win-node
    template:
        metadata:
            annotations:
                agentVersion: 0.0.0.1
                schema-versions: v1
            labels:
                dsName: ama-metrics-win-node
                kubernetes.azure.com/managedby: aks
        spec:
            affinity:
                nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                        nodeSelectorTerms:
                            - matchExpressions:
                                - key: kubernetes.io/os
                                  operator: In
                                  values:
                                    - windows
                                - key: type
                                  operator: NotIn
                                  values:
                                    - virtual-kubelet
            containers:
                - env:
                    - name: CLUSTER
                      value: /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/test-rg/providers/Microsoft.ContainerService/managedClusters/test-cluster
                    - name: AKSREGION
                      value: eastus
                    - name: MAC
                      value: "true"
                    - name: AZMON_COLLECT_ENV
                      value: "false"
                    - name: customEnvironment
                      value: azurepubliccloud
                    - name: OMS_TLD
                      value: opinsights.azure.com
                    - name: CONTROLLER_TYPE
                      value: DaemonSet
                    - name: NODE_IP
                      valueFrom:
                        fieldRef:
                            fieldPath: status.hostIP
                    - name: NODE_NAME
                      valueFrom:
                        fieldRef:
                            fieldPath: spec.nodeName
                    - name: POD_NAME
                      valueFrom:
                        fieldRef:
                            fieldPath: metadata.name
                    - name: POD_NAMESPACE
                      valueFrom:
                        fieldRef:
                            fieldPath: metadata.namespace
                    - name: CONTAINER_CPU_LIMIT
                      valueFrom:
                        resourceFieldRef:
                            containerName: prometheus-collector
                            divisor: 1m
                            resource: limits.cpu
                    - name: CONTAINER_MEMORY_LIMIT
                      valueFrom:
                        resourceFieldRef:
                            containerName: prometheus-collector
                            divisor: 1Mi
                            resource: limits.memory
                    - name: KUBE_STATE_NAME
                      value: ama-metrics-ksm
                    - name: NODE_EXPORTER_NAME
                    - name: NODE_EXPORTER_TARGETPORT
                      value: "19100"
                    - name: KUBE_STATE_VERSION
                      value: mcr.microsoft.com/oss/v2/kubernetes/kube-state-metrics:v2.17.0-6-win
                    - name: NODE_EXPORTER_VERSION
                    - name: AGENT_VERSION
                      value: 0.1.0-win
                    - name: MODE
                      value: advanced
                    - name: WINMODE
                      value: advanced
                    - name: MINIMAL_INGESTION_PROFILE
                      value: "true"
                    - name: APPMONITORING_AUTOINSTRUMENTATION_ENABLED
                      value: "false"
                    - name: APPMONITORING_OPENTELEMETRYMETRICS_ENABLED
                      value: "false"
                    - name: APPMONITORING_OPENTELEMETRYMETRICS_PORT
                      value: "28333"
                    - name: APPMONITORING_OPENTELEMETRYMETRICS_PORT_GRPC
                      value: "28334"
                  image: mcr.microsoft.com/azuremonitor/containerinsights/ciprod/prometheus-collector/images:0.1.0-win
                  imagePullPolicy: IfNotPresent
                  livenessProbe:
                    failureThreshold: 3
                    httpGet:
                        path: /health
                        port: 8080
                    initialDelaySeconds: 300
                    periodSeconds: 60
                    timeoutSeconds: 60
                  name: prometheus-collector
                  resources:
                    limits:
                        cpu: 500m
                        memory: 1Gi
                  securityContext:
                    capabilities:
                        add:
                            - DAC_OVERRIDE
                        drop:
                            - ALL
                    privileged: false
                  volumeMounts:
                    - mountPath: /etc/config/settings
                      name: settings-vol-config
                      readOnly: true
                    - mountPath: /etc/config/settings/prometheus
                      name: prometheus-config-vol
                      readOnly: true
                    - mountPath: /etc/prometheus/certs
                      name: ama-metrics-tls-secret-volume
                      readOnly: true
                    - mountPath: /var/log/containers
                      name: host-log-containers
                      readOnly: true
                    - mountPath: /var/log/pods
                      name: host-log-pods
                      readOnly: true
                - args:
                    - --secret-namespace=kube-system
                    - --secret-name=aad-msi-auth-token
                    - --token-server-listening-port=7777
                    - --health-server-listening-port=9999
                    - --restart-pod-waiting-minutes-on-broken-connection=240
                  command:
                    - addon-token-adapter-win
                  image: mcr.microsoft.com/aks/msi/addon-token-adapter:master.260209.2
                  imagePullPolicy: IfNotPresent
                  livenessProbe:
                    httpGet:
                        path: /healthz
                        port: 9999
                    initialDelaySeconds: 10
                    periodSeconds: 60
                  name: addon-token-adapter-win
                  resources:
                    limits:
                        memory: 500Mi
                    requests:
                        cpu: 100m
                        memory: 100Mi
                  securityContext:
                    capabilities:
                        add:
                            - NET_ADMIN
                        drop:
                            - ALL
            priorityClassName: system-node-critical
            serviceAccountName: ama-metrics-serviceaccount
            tolerations:
                - key: CriticalAddonsOnly
                  operator: Exists
                - effect: NoExecute
                  operator: Exists
                - effect: NoSchedule
                  operator: Exists
            volumes:
                - configMap:
                    name: ama-metrics-settings-configmap
                    optional: true
                  name: settings-vol-config
                - configMap:
                    name: ama-metrics-prometheus-config-node-windows
                    optional: true
                  name: prometheus-config-vol
                - hostPath:
                    path: /var/log/containers
                  name: host-log-containers
                - hostPath:
                    path: /var/log/pods
                  name: host-log-pods
                - name: ama-metrics-tls-secret-volume
                  secret:
                    optional: true
                    secretName: ama-metrics-mtls-secret
    updateStrategy:
        rollingUpdate:
            maxUnavailable: 50%
        type: RollingUpdate

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
    labels:
        component: ama-metrics-pdb
        kubernetes.azure.com/managedby: aks
    name: ama-metrics-pdb
    namespace: kube-system
spec:
    maxUnavailable: 1
    selector:
        matchLabels:
            rsName: ama-metrics
    unhealthyPodEvictionPolicy: AlwaysAllow

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
    labels:
        component: ama-metrics-hpa
        kubernetes.azure.com/managedby: aks
    name: ama-metrics-hpa
    namespace: kube-system
spec:
    behavior:
        scaleDown:
            policies:
                - periodSeconds: 300
                  type: Pods
                  value: 1
            stabilizationWindowSeconds: 300
    maxReplicas: 30
    metrics:
        - containerResource:
            container: prometheus-collector
            name: memory
            target:
                averageValue: 5Gi
                type: AverageValue
          type: ContainerResource
    minReplicas: 2
    scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: ama-metrics
