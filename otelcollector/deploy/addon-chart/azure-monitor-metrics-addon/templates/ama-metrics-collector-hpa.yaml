{{- $arcExtensionSettings := include "arc-extension-settings" . | fromYaml }}
{{- if or .Values.AzureMonitorMetrics.CollectorHPAEnabled $arcExtensionSettings.hpaEnabled }}
{{- $amaMetricsHpa := include "ama-metrics-merge-custom-hpa" . | fromYaml }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ama-metrics-hpa
  namespace: kube-system
  labels:
    component: ama-metrics-hpa
    kubernetes.azure.com/managedby: aks
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ama-metrics
  minReplicas: {{ $amaMetricsHpa.amaMetricsMinReplicasFromHelper }}
  maxReplicas: {{ $amaMetricsHpa.amaMetricsMaxReplicasFromHelper }}
  metrics:
{{- if semverCompare ">=1.27.0" .Values.global.commonGlobals.Versions.Kubernetes }}
    - type: ContainerResource
      containerResource:
        name: memory
        container: prometheus-collector
        target:
          averageValue: 5Gi
          type: AverageValue
{{- else }}
    # ContainerResource metrics require the HPAContainerMetrics feature gate
    # (alpha in K8s 1.20, beta/default in 1.27, GA in 1.30). For clusters on
    # K8s < 1.27, fall back to a pod-level Resource metric.
    - type: Resource
      resource:
        name: memory
        target:
          averageValue: 5Gi
          type: AverageValue
{{- end }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 300
{{- end }}