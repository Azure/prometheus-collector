# NOTE: The HealthCheckRequest and HealthSignal CRDs are defined by the
# AKS-Health-Signal project (https://github.com/Azure/AKS-Health-Signal).
# The HealthCheckRequest CRD is installed by the AKS RP.
# Only the HealthSignal CRD needs to be applied by the monitoring addon.
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: healthsignals.health.aks.io
spec:
  group: health.aks.io
  names:
    kind: HealthSignal
    listKind: HealthSignalList
    plural: healthsignals
    singular: healthsignal
    shortNames:
      - hs
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [type, targetRef]
              properties:
                type:
                  type: string
                  description: "Health signal type: NodeHealth or ClusterHealth."
                  enum:
                    - NodeHealth
                    - ClusterHealth
                targetRef:
                  type: object
                  description: Reference to the Kubernetes object this signal targets.
                  properties:
                    apiVersion:
                      type: string
                    kind:
                      type: string
                    name:
                      type: string
                    namespace:
                      type: string
                    uid:
                      type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys: [type]
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason, message]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
