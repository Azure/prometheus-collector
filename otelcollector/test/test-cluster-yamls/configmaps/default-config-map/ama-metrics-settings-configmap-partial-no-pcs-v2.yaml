kind: ConfigMap
apiVersion: v1
# Regression fixture for the v2 partial-configmap bug.
#
# This is a schema-version v2 ama-metrics-settings-configmap that intentionally
# OMITS the optional `prometheus-collector-settings` section. Before the
# ParseMetricsFiles fix, a missing optional section file caused the agent to
# discard the ENTIRE configmap and fall back to defaults, so the customizations
# under `cluster-metrics` below were silently ignored.
#
# The custom kube-state-metrics scrape interval (59s) and keep-list (PV/PVC
# metrics, which are NOT part of the minimal-ingestion-profile baseline) are the
# observable signals: if the partial configmap is honored, the served
# kube-state-metrics scrape job uses them; if it is discarded (the bug), it falls
# back to the 30s default and the minimal keep-list without the PV/PVC metrics.
data:
  schema-version:
    #string.used by agent to parse config. supported versions are {v1, v2}. Configs with other schema versions will be rejected by the agent.
    v2
  config-version:
    #string.used by customer to keep track of this config file's version in their source control/repository (max allowed 10 chars, other chars will be truncated)
    ver1
  cluster-metrics: |-
    default-targets-scrape-enabled: |-
      kubelet = true
      coredns = true
      cadvisor = true
      kubeproxy = true
      apiserver = true
      kubestate = true
      nodeexporter = true
      windowsexporter = true
      windowskubeproxy = true
      kappiebasic = true
      networkobservabilityRetina = true
      networkobservabilityHubble = true
      networkobservabilityCilium = true
      acstor-capacity-provisioner = true
      acstor-metrics-exporter = true
      prometheuscollectorhealth = false
      local-csi-driver = true
    pod-annotation-based-scraping: |-
      podannotationnamespaceregex = ""
    default-targets-metrics-keep-list: |-
      kubelet = ""
      coredns = ""
      cadvisor = ""
      kubeproxy = ""
      apiserver = ""
      kubestate = "kube_persistentvolumeclaim_info|kube_persistentvolume_capacity_bytes"
      nodeexporter = ""
      windowsexporter = ""
      windowskubeproxy = ""
      podannotations = ""
      kappiebasic = ""
      networkobservabilityRetina = ""
      networkobservabilityHubble = ""
      networkobservabilityCilium = ""
      acstor-capacity-provisioner = ""
      acstor-metrics-exporter = ""
      local-csi-driver = ""
    minimal-ingestion-profile: |-
      enabled = true
    default-targets-scrape-interval-settings: |-
      kubelet = "30s"
      coredns = "30s"
      cadvisor = "30s"
      kubeproxy = "30s"
      apiserver = "30s"
      kubestate = "59s"
      nodeexporter = "30s"
      windowsexporter = "30s"
      windowskubeproxy = "30s"
      kappiebasic = "30s"
      networkobservabilityRetina = "30s"
      networkobservabilityHubble = "30s"
      networkobservabilityCilium = "30s"
      acstor-capacity-provisioner = "30s"
      acstor-metrics-exporter = "30s"
      prometheuscollectorhealth = "30s"
      podannotations = "30s"
      local-csi-driver = "30s"
metadata:
  name: ama-metrics-settings-configmap
  namespace: kube-system
