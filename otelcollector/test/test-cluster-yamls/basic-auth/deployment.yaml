apiVersion: apps/v1
kind: Deployment
metadata:
  name: basic-auth-ref-app
  namespace: basic-auth-test
spec:
  selector:
    matchLabels:
      app: basic-auth-ref-app
  replicas: 1
  template:
    metadata:
      labels:
        app: basic-auth-ref-app
    spec:
      containers:
        - name: basic-auth-ref-app-golang
          image: mcr.microsoft.com/azuremonitor/containerinsights/cidev/prometheus-collector/images:6.27.0-main-04-23-2026-1bb78d89-ref-app-golang
          ports:
            - containerPort: 2114
              protocol: TCP
              name: "ba-metrics"
      nodeSelector:
        kubernetes.io/os: linux
        kubernetes.io/arch: amd64
---
apiVersion: v1
kind: Service
metadata:
  name: basic-auth-ref-service
  namespace: basic-auth-test
  labels:
    app: basic-auth-ref-app
spec:
  selector:
    app: basic-auth-ref-app
  ports:
    - name: "ba-metrics"
      protocol: TCP
      port: 2114
      targetPort: 2114
