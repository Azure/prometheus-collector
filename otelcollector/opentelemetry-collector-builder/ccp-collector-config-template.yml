exporters:
  prometheus:
    endpoint: "127.0.0.1:9091"
    const_labels:
      cluster: ${env:AZMON_CLUSTER_LABEL}
  otlp_grpc:
    endpoint: 127.0.0.1:55680
    tls:
      insecure: true
    compression: "gzip"
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 1000
    timeout: 12s
processors:
  batch:
    send_batch_size: 7000
    timeout: 200ms
    send_batch_max_size: 7000
  resource:
    attributes:
      - key: cluster
        value: "${env:AZMON_CLUSTER_LABEL}"
        action: "upsert"
      - key: job
        from_attribute: service.name
        action: insert
      - key: instance
        from_attribute: service.instance.id
        action: insert
receivers:
  prometheus:
    config:
service:
  pipelines:
    metrics:
      receivers: [prometheus]
      exporters: [otlp_grpc]
      processors: [batch, resource]
  telemetry:
    logs:
      level: warn
      encoding: json
      output_paths: ["collector.log.json"]
    metrics:
      level: detailed
